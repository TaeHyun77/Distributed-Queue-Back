spring.application.name=Integrated
server.port=8081

queue.validation.key=park

queue.allow.interval-ms=3000
queue.allow.max-capacity=200

spring.redis.host=redis-master
spring.redis.port=6379

spring.redis.sentinel.master=toMaster
spring.redis.sentinel.nodes=redis-sentinel01:26379,redis-sentinel02:26379,redis-sentinel03:26379

queue.event.topic.name=queueing-system
spring.kafka.admin.bootstrap-servers=kafka-1:9092,kafka-2:9092,kafka-3:9092
spring.kafka.admin.fail-fast=false

spring.kafka.producer.bootstrap-servers=kafka-1:9092,kafka-2:9092,kafka-3:9092

spring.kafka.consumer.bootstrap-servers=kafka-1:9092,kafka-2:9092,kafka-3:9092
spring.kafka.consumer.group-id=queue-group
spring.kafka.consumer.auto-offset-reset=earliest

# Spring Boot Actuator
management.endpoints.web.exposure.include=*

# Actuator
management.server.port=9292 

# /actuator/prometheus
management.endpoint.prometheus.enabled=true 
management.prometheus.metrics.export.enabled=true

server.tomcat.mbeanregistry.enabled=true
