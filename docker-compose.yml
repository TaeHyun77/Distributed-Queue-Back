version: "2.4"

services:

  # --- 대기열 프로젝트 ---
  queueing-back-1:
    image: ayeah77/integrated-queueing
    container_name: queueing01
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9292/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - SERVER_NAME=queueing01
    ports:
      - "8081:8081"
    depends_on:
      redis-sentinel01:
        condition: service_healthy
      redis-sentinel02:
        condition: service_healthy
      redis-sentinel03:
        condition: service_healthy
    networks:
      - integrated-net

  queueing-back-2:
    image: ayeah77/integrated-queueing
    container_name: queueing02
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9292/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - SERVER_NAME=queueing02
    ports:
      - "8082:8081"
    depends_on:
      redis-sentinel01:
        condition: service_healthy
      redis-sentinel02:
        condition: service_healthy
      redis-sentinel03:
        condition: service_healthy
    networks:
      - integrated-net

  queueing-back-3:
    image: ayeah77/integrated-queueing
    container_name: queueing03
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9292/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - SERVER_NAME=queueing03
    ports:
      - "8083:8081"
    depends_on:
      redis-sentinel01:
        condition: service_healthy
      redis-sentinel02:
        condition: service_healthy
      redis-sentinel03:
        condition: service_healthy
    networks:
      - integrated-net

  # --- 예약 프로젝트 ---
  mysql:
    image: mysql:8.0
    container_name: reserve-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "0136"
      MYSQL_DATABASE: reserve_project
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - integrated-net

  reserve-1:
    image: ayeah77/integrated-reserve
    container_name: reserve01
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m
      - SPRING_DATASOURCE_URL=jdbc:mysql://reserve-mysql:3306/reserve_project?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=0136
      - SPRING_DATA_REDIS_HOST=redis-master
    ports:
      - "8084:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis-sentinel01:
        condition: service_healthy
      redis-sentinel02:
        condition: service_healthy
      redis-sentinel03:
        condition: service_healthy
    networks:
      - integrated-net

  reserve-2:
    image: ayeah77/integrated-reserve
    container_name: reserve02
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m
      - SPRING_DATASOURCE_URL=jdbc:mysql://reserve-mysql:3306/reserve_project?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=0136
      - SPRING_DATA_REDIS_HOST=redis-master
    ports:
      - "8085:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis-sentinel01:
        condition: service_healthy
      redis-sentinel02:
        condition: service_healthy
      redis-sentinel03:
        condition: service_healthy
    networks:
      - integrated-net

  # --- Nginx ---
  nginx:
    image: nginx:latest
    container_name: integrated-nginx
    ports:
      - "8079:90"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      queueing-back-1:
        condition: service_healthy
      queueing-back-2:
        condition: service_healthy
      queueing-back-3:
        condition: service_healthy
      reserve-1:
        condition: service_healthy
      reserve-2:
        condition: service_healthy
    networks:
      - integrated-net

  # --- Redis Master-Slave + Sentinel ---
  redis-master:
    image: "bitnami/redis:latest"
    hostname: redis-master
    container_name: queue-redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_REPLICATION_MODE=master
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "6379:6379"
    networks:
      - integrated-net

  redis-slave01:
    image: "bitnami/redis:latest"
    hostname: redis-slave01
    container_name: queue-redis-slave01
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_REPLICATION_MODE=slave
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
    ports:
      - "6479:6379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - integrated-net

  redis-slave02:
    image: "bitnami/redis:latest"
    hostname: redis-slave02
    container_name: queue-redis-slave02
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_REPLICATION_MODE=slave
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
    ports:
      - "6579:6379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - integrated-net

  redis-sentinel01:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel01
    container_name: queue-redis-sentinel01
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000 # 마스터가 죽었다고 판단하기까지 기다리는 시간
      - REDIS_SENTINEL_FAILOVER_TIMEOUT=60000 # failover 전체 과정의 최대 시간
      - REDIS_SENTINEL_PARALLEL_SYNCS=2 # 동시에 슬레이브 동기화할 개수
      - REDIS_MASTER_HOST=redis-master # 초기 마스터의 호스트 이름
      - REDIS_MASTER_PORT_NUMBER=6379 # 초기 마스터의 포트 번호
      - REDIS_MASTER_SET=toMaster # Sentinel에서 사용하는 마스터 이름 (식별자)
      - REDIS_SENTINEL_QUORUM=2 # 마스터 장애를 인정하기 위한 Sentinel 최소 개수
    depends_on:
      redis-master:
        condition: service_healthy
      redis-slave01:
        condition: service_healthy
      redis-slave02:
        condition: service_healthy
    ports:
      - '26379:26379'
    networks:
      - integrated-net

  redis-sentinel02:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel02
    container_name: queue-redis-sentinel02
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
      - REDIS_SENTINEL_FAILOVER_TIMEOUT=60000
      - REDIS_SENTINEL_PARALLEL_SYNCS=2
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=toMaster
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      redis-master:
        condition: service_healthy
      redis-slave01:
        condition: service_healthy
      redis-slave02:
        condition: service_healthy
    ports:
      - '26380:26379'
    networks:
      - integrated-net

  redis-sentinel03:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel03
    container_name: queue-redis-sentinel03
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
      - REDIS_SENTINEL_FAILOVER_TIMEOUT=60000
      - REDIS_SENTINEL_PARALLEL_SYNCS=2
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=toMaster
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      redis-master:
        condition: service_healthy
      redis-slave01:
        condition: service_healthy
      redis-slave02:
        condition: service_healthy
    ports:
      - '26381:26379'
    networks:
      - integrated-net

  # --- 모니터링 ---
  airdnb-prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - queueing-back-1
      - queueing-back-2
      - queueing-back-3
    networks:
      - integrated-net

  airdnb-local-grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    depends_on:
      - airdnb-prometheus
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - integrated-net

networks:
  integrated-net:

volumes:
  grafana-data:
  mysql-data: