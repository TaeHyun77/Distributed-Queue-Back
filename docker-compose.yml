version: "3"

services:
  queueing-back-1:
    image: ayeah77/integrated-queueing
    container_name: queueing01
    environment:
      - SERVER_NAME=queueing01
    ports:
      - "8081:8081"
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - integrated-net

  queueing-back-2:
    image: ayeah77/integrated-queueing
    container_name: queueing02
    environment:
      - SERVER_NAME=queueing02
    ports:
      - "8082:8081"
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - integrated-net

  queueing-back-3:
    image: ayeah77/integrated-queueing
    container_name: queueing03
    environment:
      - SERVER_NAME=queueing03
    ports:
      - "8083:8081"
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - integrated-net

  nginx:
    image: nginx:latest
    container_name: integrated-nginx

    # 호스트에서 8079 포트로 접속하면, 컨테이너 내부의 90 포트로 연결
    ports:
      - "8079:90"
    # nginx.conf 파일을 nginx 컨테이너에 마운트
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - queueing-back-1
      - queueing-back-2
      - queueing-back-3
#      - integrated-reserve-1
#      - integrated-reserve-2
#      - integrated-reserve-3
    networks:
      - integrated-net

  kafka-1:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-1:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3

      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5A==' # 동일한 Cluster로 설정
    ports:
      - "9092:9092"
    networks:
      - integrated-net

  kafka-2:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-2:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3

      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5A=='
    ports:
      - "9093:9092"
    networks:
      - integrated-net

  kafka-3:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-3:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3

      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5A=='
    ports:
      - "9094:9092"
    networks:
      - integrated-net

  kafka-cli:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-cli
    entrypoint: /bin/sh
    tty: true
    networks:
      - integrated-net

  redis-master:
    image: "bitnami/redis:latest"
    hostname: redis-master
    container_name: queue-redis-master
    environment:
      - REDIS_REPLICATION_MODE=master
      - ALLOW_EMPTY_PASSWORD=yes # 비밀번호 없이
    ports:
      - "6379:6379"
    networks:
      - integrated-net

  redis-slave01:
    image: "bitnami/redis:latest"
    hostname: redis-slave01
    container_name: queue-redis-slave01
    environment:
      - REDIS_REPLICATION_MODE=slave
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
    ports:
      - "6479:6379"
    depends_on:
      - redis-master
    networks:
      - integrated-net

  redis-slave02:
    image: "bitnami/redis:latest"
    hostname: redis-slave02
    container_name: queue-redis-slave02
    environment:
      - REDIS_REPLICATION_MODE=slave
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
    ports:
      - "6579:6379"
    depends_on:
      - redis-master
      - redis-slave01
    networks:
      - integrated-net

  redis-sentinel01:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel01
    container_name: queue-redis-sentinel01
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=3000
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=toMaster
      - REDIS_SENTINEL_QUORUM=2 # 과반수
    depends_on:
      - redis-master
      - redis-slave01
      - redis-slave02
    ports:
      - '26379:26379'
    networks:
      - integrated-net

  redis-sentinel02:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel02
    container_name: queue-redis-sentinel02
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=3000
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=toMaster
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      - redis-master
      - redis-slave01
      - redis-slave02
    ports:
      - '26380:26379'
    networks:
      - integrated-net

  redis-sentinel03:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel03
    container_name: queue-redis-sentinel03
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=3000
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=toMaster
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      - redis-master
      - redis-slave01
      - redis-slave02
    ports:
      - '26381:26379'
    networks:
      - integrated-net

networks:
  integrated-net: