version: "3"

services:
  queueing-back-1:
    image: ayeah77/integrated-queueing
    container_name: queueing01
    environment:
      - SERVER_NAME=queueing01
    ports:
      - "8081:8081"
    depends_on:
      - kafka
    networks:
      - integrated-net

  queueing-back-2:
    image: ayeah77/integrated-queueing
    container_name: queueing02
    environment:
      - SERVER_NAME=queueing02
    ports:
      - "8082:8081"
    depends_on:
      - kafka
    networks:
      - integrated-net

  queueing-back-3:
    image: ayeah77/integrated-queueing
    container_name: queueing03
    environment:
      - SERVER_NAME=queueing03
    ports:
      - "8083:8081"
    depends_on:
      - kafka
    networks:
      - integrated-net

  # 예약 서버
  integrated-reserve-1:
    image: ayeah77/integrated-reserve
    container_name: integrated-reserve01
    environment:
      - SERVER_NAME=reserve01
    ports:
      - "8080:8080"
    networks:
      - integrated-net

  integrated-reserve-2:
    image: ayeah77/integrated-reserve
    container_name: integrated-reserve02
    environment:
      - SERVER_NAME=reserve02
    ports:
      - "8084:8080"
    networks:
      - integrated-net

  integrated-reserve-3:
    image: ayeah77/integrated-reserve
    container_name: integrated-reserve03
    environment:
      - SERVER_NAME=reserve03
    ports:
      - "8085:8080"
    networks:
      - integrated-net

  nginx:
    image: nginx:latest
    container_name: integrated-nginx

    # 호스트에서 8079 포트로 접속하면, 컨테이너 내부의 90 포트로 연결
    ports:
      - "8079:90"
    # nginx.conf 파일을 nginx 컨테이너에 마운트
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - queueing-back-1
      - queueing-back-2
      - queueing-back-3
      - integrated-reserve-1
      - integrated-reserve-2
      - integrated-reserve-3
    networks:
      - integrated-net

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'

      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5A=='
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    networks:
      - integrated-net

  kafka-cli:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-cli
    entrypoint: /bin/sh
    tty: true
    networks:
      - integrated-net

  redis-master:
    image: "bitnami/redis:latest"
    hostname: redis-master
    container_name: queue-redis-master
    environment:
      - REDIS_REPLICATION_MODE=master
      - ALLOW_EMPTY_PASSWORD=yes # 비밀번호 없이
    ports:
      - "6379:6379"
    networks:
      - integrated-net

  redis-slave01:
    image: "bitnami/redis:latest"
    hostname: redis-slave01
    container_name: queue-redis-slave01
    environment:
      - REDIS_REPLICATION_MODE=slave
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
    ports:
      - "6479:6379"
    depends_on:
      - redis-master
    networks:
      - integrated-net

  redis-slave02:
    image: "bitnami/redis:latest"
    hostname: redis-slave02
    container_name: queue-redis-slave02
    environment:
      - REDIS_REPLICATION_MODE=slave
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
    ports:
      - "6579:6379"
    depends_on:
      - redis-master
      - redis-slave01
    networks:
      - integrated-net

  redis-sentinel01:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel01
    container_name: queue-redis-sentinel01
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=3000
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=toMaster
      - REDIS_SENTINEL_QUORUM=2 # 과반수
    depends_on:
      - redis-master
      - redis-slave01
      - redis-slave02
    ports:
      - '26379:26379'
    networks:
      - integrated-net

  redis-sentinel02:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel02
    container_name: queue-redis-sentinel02
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=3000
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=toMaster
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      - redis-master
      - redis-slave01
      - redis-slave02
    ports:
      - '26380:26379'
    networks:
      - integrated-net

  redis-sentinel03:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel03
    container_name: queue-redis-sentinel03
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=3000
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=toMaster
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      - redis-master
      - redis-slave01
      - redis-slave02
    ports:
      - '26381:26379'
    networks:
      - integrated-net

networks:
  integrated-net: