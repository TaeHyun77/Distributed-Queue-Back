worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format timing '$remote_addr - $request_time $upstream_response_time $status $request';
    access_log /var/log/nginx/access.log timing;

    keepalive_timeout 60;
    keepalive_requests 1000;

    # 대기열 서버 (단일 인스턴스)
    upstream queueing-cluster {
        server queueing-back-1:8081 weight=1 max_fails=5 fail_timeout=30s;
        keepalive 64;
    }

    server {
        listen 90;

        # SSE 엔드포인트 - 장시간 연결 유지
        location /queue/stream {
            proxy_pass http://queueing-cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 3600s;
        }

        # 대기열 API
        location /queue/ {
            proxy_pass http://queueing-cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;
        }

        # 기본 라우팅
        location / {
            proxy_pass http://queueing-cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;
        }
    }
}
