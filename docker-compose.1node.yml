version: "2.4"

# 단일 인스턴스 베이스라인 측정용 docker-compose
#
# 실행: docker compose -f docker-compose.1node.yml up
#
# base 파일과 별도 운영. reserve 서비스 제외, queueing 인스턴스 1개만 유지

services:
  queueing-back-1:
    build: .
    image: local/queueing:latest
    container_name: queueing01
    cpus: 2.0
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9292/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - SERVER_NAME=queueing01
      - JAVA_OPTS=-Xms512m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=100
    ports:
      - "8081:8081"
    depends_on:
      redis-sentinel01:
        condition: service_healthy
      redis-sentinel02:
        condition: service_healthy
      redis-sentinel03:
        condition: service_healthy
    networks:
      - integrated-net

  # --- Redis Master-Slave + Sentinel ---
  redis-master:
    image: "bitnami/redis:latest"
    hostname: redis-master
    container_name: queue-redis-master
    cpus: 2.0
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_REPLICATION_MODE=master
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "6379:6379"
    networks:
      - integrated-net

  redis-slave01:
    image: "bitnami/redis:latest"
    hostname: redis-slave01
    container_name: queue-redis-slave01
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_REPLICATION_MODE=slave
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
    ports:
      - "6479:6379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - integrated-net

  redis-slave02:
    image: "bitnami/redis:latest"
    hostname: redis-slave02
    container_name: queue-redis-slave02
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_REPLICATION_MODE=slave
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
    ports:
      - "6579:6379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - integrated-net

  redis-sentinel01:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel01
    container_name: queue-redis-sentinel01
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
      - REDIS_SENTINEL_FAILOVER_TIMEOUT=60000
      - REDIS_SENTINEL_PARALLEL_SYNCS=2
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=toMaster
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      redis-master:
        condition: service_healthy
      redis-slave01:
        condition: service_healthy
      redis-slave02:
        condition: service_healthy
    ports:
      - '26379:26379'
    networks:
      - integrated-net

  redis-sentinel02:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel02
    container_name: queue-redis-sentinel02
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
      - REDIS_SENTINEL_FAILOVER_TIMEOUT=60000
      - REDIS_SENTINEL_PARALLEL_SYNCS=2
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=toMaster
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      redis-master:
        condition: service_healthy
      redis-slave01:
        condition: service_healthy
      redis-slave02:
        condition: service_healthy
    ports:
      - '26380:26379'
    networks:
      - integrated-net

  redis-sentinel03:
    image: 'bitnami/redis-sentinel:latest'
    hostname: redis-sentinel03
    container_name: queue-redis-sentinel03
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
      - REDIS_SENTINEL_FAILOVER_TIMEOUT=60000
      - REDIS_SENTINEL_PARALLEL_SYNCS=2
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=toMaster
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      redis-master:
        condition: service_healthy
      redis-slave01:
        condition: service_healthy
      redis-slave02:
        condition: service_healthy
    ports:
      - '26381:26379'
    networks:
      - integrated-net

  # --- 모니터링 ---
  airdnb-prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.1node.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - queueing-back-1
    networks:
      - integrated-net

  airdnb-local-grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    depends_on:
      - airdnb-prometheus
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - integrated-net

networks:
  integrated-net:

volumes:
  grafana-data:
