worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # 기본 튜닝
    sendfile on;
    keepalive_timeout 65;
    keepalive_requests 10000;

    # 서버 간 연결 재사용을 위한 설정
    upstream queueing-cluster {
        server queueing-back-1:8081;
        server queueing-back-2:8081;
        server queueing-back-3:8081;

        keepalive 64;
    }

;     upstream reserve-cluster {
;         server integrated-reserve-1:8080;
;         server integrated-reserve-2:8080;
;         server integrated-reserve-3:8080;
;
;         keepalive 64;
;     }

    server {
        listen 90;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS 옵션
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods GET,POST,PUT,DELETE,OPTIONS always;
        add_header Access-Control-Allow-Headers * always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # 기본 요청 → 대기열 서버
        location / {
            proxy_pass http://queueing-cluster;
        }

;         # 예약 API 요청 → 예약 서버
;         location /api/ {
;             proxy_pass http://reserve-cluster;
;         }
    }
}
