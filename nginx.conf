  worker_processes auto;

  events {
      worker_connections 4096;
  }

  http {
      keepalive_timeout 60;
      keepalive_requests 1000;

      upstream queueing-cluster {
          server queueing-back-1:8081 weight=1;
          server queueing-back-2:8081 weight=1;
          server queueing-back-3:8081 weight=1;
          keepalive 32;
      }

      server {
          listen 90;

          location / {
              proxy_pass http://queueing-cluster;
              proxy_http_version 1.1;
              proxy_set_header Connection "";
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Request-Timestamp $msec;

              # SSE 지원
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 3600s;
          }
      }
  }
